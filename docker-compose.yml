services:
  mysql:
    image: mysql:8.0
    container_name: ludoteca-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ludoteca
    ports:
      - "3306:3306"
    volumes:
      - ludoteca-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ludoteca-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend-vendor:/app/vendor
      - backend-bootstrap-cache:/app/bootstrap/cache
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
        composer install --no-interaction &&
        php artisan key:generate --force &&
        php artisan storage:link --force &&
        php artisan config:cache &&
        php artisan route:clear &&
        php artisan migrate --force &&
        php artisan db:seed --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

volumes:
  ludoteca-mysql-data:
  backend-vendor:
  backend-bootstrap-cache:
